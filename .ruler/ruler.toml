# mochila-ts Okigu Ruler Configuration
# Manages AI coding instructions for Cursor and Claude Code

default_agents = ["cursor", "claude"]

# MCP server configuration sharing
[mcp]
enabled = false

# Automatically manage .gitignore entries
[gitignore]
enabled = true

# Claude Code agent configuration
[agents.claude]
enabled = true
output_path = "CLAUDE.md"

[agents.claude.mcp]
enabled = false

# Cursor agent configuration
[agents.cursor]
enabled = true
output_path = ".cursor/rules/ruler_cursor_instructions.mdc"

[agents.cursor.mcp]
enabled = false
